<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTacTech - Modern Web Edition</title>
    <meta name="description" content="A visually stunning, modern implementation of Tic Tac Toe with glassmorphism and animations.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="game-container glass-panel">
        <header>
            <h1 class="gradient-text">TicTacTech</h1>
            <p class="subtitle">Advanced Web Protocol</p>
        </header>

        <div class="status-bar">
            <div class="player-turn glass-pill">
                Current Turn: <span id="current-player" class="player-x">X</span>
            </div>
            <div class="scores glass-pill">
                <span class="score-x">X: <span id="score-x">0</span></span>
                <span class="score-o">O: <span id="score-o">0</span></span>
            </div>
        </div>

        <div class="board" id="board">
            <!-- Grid cells generated by JS -->
        </div>

        <div class="controls">
            <button id="reset-btn" class="glass-btn primary">Reset Game</button>
            <button id="mode-btn" class="glass-btn secondary">vs AI: OFF</button>
        </div>
    </main>

    <!-- Winner Modal -->
    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel bounce-in">
            <h2 id="modal-title" class="gradient-text">Winner!</h2>
            <p id="modal-message">Player X has won the game.</p>
            <button id="modal-close" class="glass-btn primary mt-4">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
